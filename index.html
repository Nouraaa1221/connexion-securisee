<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONEX | Gateway d'Authentification</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-wrapper">
    <div id="lockout-screen" class="hidden">
        <div class="lockout-content">
            <h2>ACCÈS SUSPENDU</h2>
            <p>Protection anti-brute force activée.</p>
            <div class="timer" id="lockout-timer">00:30</div>
        </div>
    </div>

    <div class="auth-container" id="auth-container">
        <header>
            <div class="brand-logo">CONEX</div>
            <div class="module-name">SYSTÈME D'AUTHENTIFICATION CRITIQUE</div>
        </header>

        <section id="step-1" class="auth-step">
            <form id="loginForm">
                <div class="field">
                    <label>Identifiant Réseau</label>
                    <input type="email" id="email" placeholder="user@network.sys" required>
                </div>

                <div class="field">
                    <div class="label-group">
                        <label>Clé d'Accès</label>
                        <span id="entropy-label">Analyse d'entropie</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" required>
                        <div id="strength-meter"><div id="strength-bar"></div></div>
                    </div>
                    <ul class="policy-list">
                        <li id="len" class="invalid">Minimum 12 caractères</li>
                        <li id="spec" class="invalid">Symbole + Caractère numérique</li>
                    </ul>
                </div>

                <button type="submit" class="btn-primary">INITIALISER LA SESSION</button>
            </form>
        </section>

        <section id="step-2" class="auth-step hidden">
            <div class="mfa-info">
                <p>Validation MFA requise via jeton sécurisé.</p>
            </div>
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
            </div>
            <button id="verifyMFA" class="btn-primary">VALIDER L'IDENTITÉ</button>
        </section>

        <div id="system-logs">
            <div class="log-entry">Initialisation du protocole...</div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
