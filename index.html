<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONEX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="background-overlay"></div>

<div class="login-container">
    <div class="terminal-header">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-title">System_Access.v2</span>
    </div>

    <div class="content">
        <div class="logo">
            <div class="shield-icon">🛡️</div>
            <h1>SECURE<span>CORE</span></h1>
            <p class="subtitle">Protocole de connexion chiffré</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Identifiant</label>
                <input type="email" id="email" placeholder="nom@agence.cyb" required>
            </div>

            <div class="input-group">
                <label for="password">Clé d'accès</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" id="togglePassword" class="eye-btn">👁️</button>
                </div>
                <div class="strength-meter">
                    <div id="strength-bar" class="bar"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn">
                <span class="btn-text">INITIALISER LA SESSION</span>
                <div class="loader"></div>
            </button>
            
            <p id="message"></p>
        </form>
    </div>
    <div class="footer-info">
        AES-256 Bit Encryption | IP: <span id="user-ip">192.168.1.X</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
